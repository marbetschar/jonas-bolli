<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Format - Jonas Bolli</title>
    <link rel="stylesheet" href="css/main.css">
  </head>
  <body>
    <nav class="navbar is-block is-fixed-top has-background-transparent has-background-blur-white" role="navigation" aria-label="main navigation">
      <div class="navbar-brand is-size-3 has-background-transparent">
        <a class="navbar-item" href="/">
          <h1 class="has-text-white has-text-weight-semibold">Video Format</h1>
        </a>

        <a role="button" class="navbar-burger is-flex-desktop has-text-white" aria-label="menu" aria-expanded="false" data-target="navbar-main">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbar-main" class="navbar-menu is-hidden">
        <div class="navbar-end">
          <div class="navbar-item">
            <div class="buttons">
              <a class="button is-primary">
                <strong>Menu</strong>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div id="container-video" class="has-background-black is-absolute-fullsize is-flex">
      <video class="is-not-visible" autoplay loop muted>
        <source src="assets/img/konzept.mp4" type="video/mp4" />
      </video>

      <video class="is-not-visible" autoplay loop muted>
        <source src="assets/img/nachbearbeitung.mp4" type="video/mp4" />
      </video>

      <video class="is-not-visible" autoplay loop muted>
        <source src="assets/img/nachbearbeitung.mp4" type="video/mp4" />
      </video>
    </div>

    <section class="hero is-fullheight">
      <div class="hero-head"></div>
      <div class="hero-body"></div>
      <div class="hero-foot">
        <nav id="navbar-video" class="navbar has-background-blur-light">
          <ul class="is-flex is-fullwidth is-flex-wrap-wrap is-justify-content-space-around buttons are-large has-background-transparent">
            <li class="is-flex is-flex-direction-row is-align-items-center navbar-item is-active">
              <a href="#" class="button">Konzept</a>
            </li>
            <li class="is-flex is-flex-direction-row is-align-items-center">
              <a href="#" class="button">Umsetzung</a>
            </li>
            <li class="is-flex is-flex-direction-row is-align-items-center">
              <a href="#" class="button">Nachbearbeitung</a>
            </li>
          </ul>
        </nav>
      </div>
    </section>
    <script type="text/javascript" src="lib/main.js"></script>
  </body>
</html>
